# ============================================================
# APPLICATION PROPERTIES — Spring Boot Configuration
# ============================================================
#
# This file configures how your Spring Boot application behaves.
# Spring Boot reads this file at startup and applies the settings.
#
# FORMAT: key=value (one per line)
# Lines starting with # are comments
# ============================================================

# -------- APPLICATION --------
spring.application.name=Personal Finance Tracker
server.port=8080

# -------- DATABASE (H2 — In-Memory for Development) --------
# H2 is an embedded database that runs INSIDE your Java application.
# No installation needed! Data is stored in memory (resets on restart).
#
# jdbc:h2:mem:financedb — "mem" means in-memory, "financedb" is the DB name
# For file-based persistence: jdbc:h2:file:./data/financedb
spring.datasource.url=jdbc:h2:file:./data/financedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 Console — A web-based database viewer (dev only!)
# Access it at: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:file:./data/financedb | Username: sa | Password: (empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------- JPA / HIBERNATE --------
# ddl-auto controls what Hibernate does with the database schema on startup:
#   create      — Drop all tables, recreate them (DESTROYS DATA!)
#   create-drop — Same as create, but also drops on shutdown
#   update      — Add new columns/tables, never delete (SAFE for dev)
#   validate    — Only verify schema matches entities (SAFE for prod)
#   none        — Do nothing
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# -------- JWT CONFIGURATION --------
# Secret key for signing JWT tokens (in production, use environment variables!)
# This should be a long, random string. NEVER commit real secrets to Git.
jwt.secret=mySecretKeyForFinanceTracker2026ThisShouldBeLongEnoughForHS256Algorithm!!
jwt.expiration=86400000

# -------- LOGGING --------
logging.level.com.finance.tracker=DEBUG
logging.level.org.springframework.security=DEBUG

# -------- CORS --------
# Allow the frontend (running on a different port) to call the API
# In production, replace * with your actual domain
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
